name: Create PR with Copilot

# 触发条件按需调整
on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:  # 支持手动触发

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔴 修复前：错误包名 @github/copilot-cli
      # ✅ 修复后：使用官方正确包名 @githubcli/copilot-cli
      - name: Install GitHub Copilot CLI
        run: npm install -g @githubcli/copilot-cli

      # 可选：验证安装是否成功
      - name: Verify Copilot CLI installation
        run: copilot --version


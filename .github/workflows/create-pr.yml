name: Create PR with New File (Copilot CLI Prompt Fixed)

on:
  workflow_dispatch:
    inputs:
      new_branch_name:
        description: 'Name of the new branch to create'
        required: true
        default: 'feature/add-new-file'
      file_name:
        description: 'Name of the new file to create'
        required: true
        default: 'new_file.txt'
      file_content:
        description: 'Content to write to the new file'
        required: true
        default: 'Hello! This file was created by GitHub Actions workflow.'
      pr_title:
        description: 'Title of the Pull Request'
        required: true
        default: 'Add new file via GitHub Actions'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      # 安装 Copilot CLI
      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot-cli

      - name: Create and switch to new branch
        run: git checkout -b "${{ inputs.new_branch_name }}"

      # ✅ 修复：用 >- 折叠多行，避免 YAML 解析报错
      - name: Use Copilot CLI to create file and write content
        run: >-
          copilot -p "Create a new file named '${{ inputs.file_name }}' in current directory, write exactly the following content into it, do not modify any character: `${{ inputs.file_content }}`"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add, commit and push
        run: |
          git add "${{ inputs.file_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Add ${{ inputs.file_name }}"
          git push origin "${{ inputs.new_branch_name }}"

      - name: Create Pull Request
        run: |
          gh pr create \
            --base main \
            --head "${{ inputs.new_branch_name }}" \
            --title "${{ inputs.pr_title }}" \
            --body "This PR was automatically created by GitHub Actions workflow. Added file: \`${{ inputs.file_name }}\`"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Create PR with New File

on:
  workflow_dispatch:
    inputs:
      new_branch_name:
        description: 'Name of the new branch to create'
        required: true
        default: 'feature/add-new-file'
      file_name:
        description: 'Name of the new file to create'
        required: true
        default: 'new_file.txt'
      file_content:
        description: 'Content to write to the new file'
        required: true
        default: 'Hello! This file was created by GitHub Actions workflow.'
      pr_title:
        description: 'Title of the Pull Request'
        required: true
        default: 'Add new file via GitHub Actions'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the source branch (master)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      # Step 2: Create new branch from master and switch to it
      - name: Create and switch to new branch
        run: |
          git checkout -b "${{ inputs.new_branch_name }}"

      # Step 3: Create a new file and add content
      - name: Create new file with content
        run: |
          printf '%s\n' "${{ inputs.file_content }}" > "${{ inputs.file_name }}"

      # Step 4: Add, commit and push changes
      - name: Add, commit and push
        run: |
          git add "${{ inputs.file_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Add ${{ inputs.file_name }}"
          git push origin "${{ inputs.new_branch_name }}"

      # Step 5: Create Pull Request (new branch -> master)
      - name: Create Pull Request
        run: |
          gh pr create \
            --base master \
            --head "${{ inputs.new_branch_name }}" \
            --title "${{ inputs.pr_title }}" \
            --body "This PR was automatically created by GitHub Actions workflow. Added file: \`${{ inputs.file_name }}\`"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
